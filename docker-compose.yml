version: '3.8'

services:
  app:
    build: .
    ports:
      - "80:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/firestop_evac_tracker.db
    volumes:
      - ./data:/app/data
      - ./uploads:/app/wwwroot/uploads
    restart: unless-stopped
